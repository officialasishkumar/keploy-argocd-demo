# HTTPProxy for Keploy k8s-proxy via Contour (TLS passthrough) — production.
#
# TLS passthrough forwards the encrypted connection directly to the k8s-proxy
# without terminating TLS at Envoy. The k8s-proxy handles TLS natively.
#
# For production (LoadBalancer), TLS passthrough uses port 443 by default.
# Your DNS should point to the LoadBalancer's external IP.
#
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: k8s-proxy-ingress
  namespace: keploy
  labels:
    app: k8s-proxy
spec:
  virtualhost:
    # Replace with your actual production domain.
    fqdn: proxy.example.com
    tls:
      passthrough: true
  tcpproxy:
    services:
      - name: k8s-proxy
        port: 8080
