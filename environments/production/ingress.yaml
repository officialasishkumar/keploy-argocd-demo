# Ingress for sample-order-service via Contour (production).
#
# For production, replace the host with your actual domain.
# TLS termination can be added via the tls section below.
#
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sample-order-service
  namespace: production
  labels:
    app: sample-order-service
    environment: production
spec:
  ingressClassName: contour
  rules:
    - host: orders.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sample-order-service
                port:
                  number: 80
  # Uncomment for TLS:
  # tls:
  #   - hosts:
  #       - orders.example.com
  #     secretName: orders-tls
