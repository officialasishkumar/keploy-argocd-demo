# HTTPProxy for Keploy k8s-proxy via Contour (TLS passthrough).
#
# WHY TLS PASSTHROUGH?
# The k8s-proxy serves HTTPS natively on its backend port. Instead of
# terminating TLS at Envoy and re-encrypting to the backend, we use
# TLS passthrough — Envoy forwards the encrypted connection directly
# to the k8s-proxy without inspecting or decrypting it.
#
# WHY HTTPProxy instead of a standard Ingress?
# Standard Kubernetes Ingress does not support TLS passthrough. Contour's
# HTTPProxy CRD provides this via `tls.passthrough: true` + `tcpproxy`.
#
# IMPORTANT: TLS passthrough uses Envoy's HTTPS listener (port 443).
# On a Kind/VM cluster with NodePort, this means traffic arrives on the
# HTTPS NodePort (e.g. 30443), NOT the HTTP NodePort (30080).
# If your Kind cluster only maps port 30080, swap the Envoy service ports
# so the HTTPS listener uses 30080 — see README for instructions.
#
apiVersion: projectcontour.io/v1
kind: HTTPProxy
metadata:
  name: k8s-proxy-ingress
  namespace: keploy
  labels:
    app: k8s-proxy
spec:
  virtualhost:
    # Replace with your actual ingress hostname.
    # This must match the host part of keploy.ingressUrl in the k8s-proxy Helm values.
    fqdn: asish.kumar.io
    tls:
      passthrough: true
  tcpproxy:
    services:
      - name: k8s-proxy
        port: 8080
