# Contour Ingress Controller - deploy as a prerequisite before other ArgoCD apps.
#
# Contour is a CNCF ingress controller powered by Envoy proxy.
# It supports standard Kubernetes Ingress resources and its own HTTPProxy CRD
# for advanced routing (retries, rate limiting, TLS backend passthrough, etc.)
#
# WHY NOT AN ARGOCD APP?
# The Bitnami Helm chart images are frequently unavailable on Docker Hub.
# The official Contour project publishes reliable quickstart manifests at
# https://projectcontour.io/quickstart/contour.yaml — so we deploy those
# directly and patch Envoy to use NodePort for VM/Kind clusters.
#
# DEPLOY (run once per cluster):
#
#   kubectl apply -f https://projectcontour.io/quickstart/contour.yaml
#
#   # For VM / Kind clusters: patch Envoy to NodePort 30080/30443
#   kubectl patch svc envoy -n projectcontour --type='json' -p='[
#     {"op": "replace", "path": "/spec/type", "value": "NodePort"},
#     {"op": "replace", "path": "/spec/ports/0/nodePort", "value": 30080},
#     {"op": "replace", "path": "/spec/ports/1/nodePort", "value": 30443}
#   ]'
#
# VERIFY:
#
#   kubectl get pods -n projectcontour
#   kubectl get svc  -n projectcontour
#
# For production / cloud clusters (EKS/GKE/AKS), skip the NodePort patch —
# the default LoadBalancer type is correct. Your cloud provider assigns an
# external IP automatically.
