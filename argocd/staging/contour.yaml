# ArgoCD Application - deploys Contour ingress controller to the cluster.
#
# Contour is a CNCF ingress controller powered by Envoy proxy.
# It supports standard Kubernetes Ingress resources and its own HTTPProxy CRD
# for advanced routing (retries, rate limiting, traffic splitting, etc.)
#
# Once deployed, any Ingress with `ingressClassName: contour` will be routed
# through Envoy. The k8s-proxy and sample-order-service both use this.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: contour-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: contour
    repoURL: registry-1.docker.io/bitnamicharts
    targetRevision: "21.1.4"
    helm:
      values: |
        envoy:
          kind: deployment
          replicaCount: 1
          service:
            # NodePort for local / VM / Kind clusters.
            # For cloud (EKS/GKE/AKS), change to LoadBalancer.
            type: NodePort
            nodePorts:
              http: "30080"
              https: "30443"

        contour:
          ingressClass:
            name: contour
            create: true
            default: true

  destination:
    server: https://kubernetes.default.svc
    namespace: projectcontour

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
