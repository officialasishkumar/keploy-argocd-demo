# ArgoCD Application - deploys Keploy k8s-proxy to staging via OCI Helm chart.
#
# Prerequisites (run once, before applying this file):
#
#   1. Deploy Contour (see argocd/staging/contour.yaml for instructions)
#
#   2. Create the keploy-credentials secret:
#      kubectl create namespace keploy
#      kubectl -n keploy create secret generic keploy-credentials \
#        --from-literal=access-key="<YOUR_ACCESS_KEY>"
#
#   3. Apply the HTTPProxy for k8s-proxy routing:
#      kubectl apply -f environments/staging/k8s-proxy-httpproxy.yaml
#
# The access key is obtained from the Keploy UI when you create a new cluster.
# Never commit your access key to Git.
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keploy-k8s-proxy-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    chart: k8s-proxy-chart
    repoURL: registry-1.docker.io/keploy
    targetRevision: "3.3.10"
    helm:
      values: |
        replicaCount: 1
        environment: "staging"
        selfHosted: false

        keploy:
          existingSecret: "keploy-credentials"
          existingSecretKey: "access-key"
          clusterName: "staging-cluster"
          apiServerUrl: "https://api.staging.keploy.io"
          # This is the URL the Keploy cloud uses to reach the k8s-proxy.
          # Traffic flows: Keploy cloud -> Envoy (NodePort 30080) -> k8s-proxy
          # Replace with your actual hostname (must match the HTTPProxy fqdn).
          ingressUrl: "https://asish.kumar.io:30080"

        # ClusterIP — external traffic enters via Contour/Envoy HTTPProxy
        service:
          type: ClusterIP

        mongodb:
          enabled: false
        minio:
          enabled: false

  destination:
    server: https://kubernetes.default.svc
    namespace: keploy

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
