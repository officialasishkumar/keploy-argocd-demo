# Contour Ingress Controller - deploy as a prerequisite before other ArgoCD apps.
#
# For production / cloud clusters (EKS/GKE/AKS), the default Envoy service
# type is LoadBalancer — no patching needed. Your cloud provider assigns an
# external IP or hostname automatically.
#
# DEPLOY (run once per cluster):
#
#   kubectl apply -f https://projectcontour.io/quickstart/contour.yaml
#
# VERIFY:
#
#   kubectl get pods -n projectcontour
#   kubectl get svc  -n projectcontour   # EXTERNAL-IP column shows the LB address
#
# Point your DNS records (e.g. proxy.example.com) to the LoadBalancer address.
